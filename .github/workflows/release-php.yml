name: Release PHP

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-php:
    name: Release PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.3
          tools: composer:2.10

      - name: Install dependencies
        run: composer install

      - name: Set release version
        env:
          INPUTS_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${INPUTS_VERSION:-${REF_NAME}}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "Release version: $version"
          sed -i "s/\"skilltest-version\": \"development\"/\"skilltest-version\": \"${version}\"/g" box.json

      - name: Build PHAR
        run: composer build

      - name: Test PHAR
        run: |
          ./.build/skilltest.phar --version
          ./.build/skilltest.phar || exit 1

      - name: Verify reported version matches the release tag
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          reported="$(./.build/skilltest.phar version --json | jq -r '.tool.version')"
          echo "Reported version: $reported"
          if [ "$reported" != "$RELEASE_VERSION" ]; then
            echo "FAIL: skilltest reported '$reported' but the release tag is '$RELEASE_VERSION'"
            exit 1
          fi

      - name: Generate SHA-256 checksums
        working-directory: .build
        run: |
          sha256sum skilltest.phar > skilltest.phar.sha256
          cat skilltest.phar.sha256

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: |
            ./.build/skilltest.phar
            ./.build/skilltest.phar.sha256
